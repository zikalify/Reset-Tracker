<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reset Tracker</title>
    <meta name="description" content="Track your streaks without losing all your progress.">
    <meta name="theme-color" content="#0d1117">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./icon.svg">
    <link rel="apple-touch-icon" href="./icon.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="title-group">
                <h1>Reset Tracker</h1>
            </div>
            <button id="settings-btn" class="icon-btn" aria-label="Settings">
                <span class="material-symbols-rounded">settings</span>
            </button>
        </header>

        <main>
            <div class="stats-card">
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="280" height="280">
                        <!-- Definitions for gradients -->
                        <defs>
                            <linearGradient id="ring-gradient" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                            <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#fbbf24" />
                                <stop offset="100%" stop-color="#f59e0b" />
                            </linearGradient>
                            <filter id="glow" filterUnits="userSpaceOnUse" x="-40" y="-40" width="360" height="360">
                                <feGaussianBlur stdDeviation="8" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        <circle class="progress-ring__bg" stroke-width="16" fill="transparent" r="120" cx="140" cy="140" />
                        <circle id="progress-ring-circle" class="progress-ring__circle" stroke="url(#ring-gradient)" stroke-width="16" stroke-linecap="round" fill="transparent" r="120" cx="140" cy="140" />
                    </svg>
                    <svg id="wave-fill" class="wave-fill" width="280" height="280" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0;">
                        <defs>
                            <clipPath id="circle-clip">
                                <circle r="104" cx="140" cy="140" />
                            </clipPath>
                        </defs>
                        <g clip-path="url(#circle-clip)">
                            <path id="wave-path" fill="url(#wave-gradient)" />
                        </g>
                    </svg>
                    <div class="stats-center">
                        <h2 id="main-stat" class="main-stat">--</h2>
                        <p id="sub-stat" class="sub-stat">Loading...</p>
                    </div>
                </div>
            </div>
            
            <div class="message-container">
                <p id="status-message" class="status-message">Start your journey today.</p>
            </div>

            <div class="actions">
                <button id="lapse-btn" class="btn btn-primary btn-large">
                    <span class="material-symbols-rounded">replay</span>
                    Log a Lapse
                </button>
            </div>
        </main>
        
        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button id="close-settings-btn" class="icon-btn close-btn" aria-label="Close">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="start-date">Start Date</label>
                        <input type="date" id="start-date" class="form-control">
                        <small class="hint">When did your journey begin?</small>
                    </div>
                    
                    <div class="form-group mt-xl">
                        <label>Manage Lapses</label>
                        <div class="add-lapse-group">
                            <input type="date" id="add-lapse-date" class="form-control" max="">
                            <button id="add-lapse-btn" class="btn btn-secondary">Add</button>
                        </div>
                        <ul id="lapses-list" class="lapses-list">
                            <!-- Lapses populated via JS -->
                        </ul>
                    </div>

                    <div class="form-group mt-xl">
                        <label>Data Management</label>
                        <div class="add-lapse-group">
                            <button id="export-data-btn" class="btn btn-secondary" style="flex:1;">Export Data</button>
                            <input type="file" id="import-data-file" accept=".json" style="display:none;">
                            <button id="import-data-btn" class="btn btn-secondary" style="flex:1;">Import Data</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="hard-reset-btn" class="btn btn-danger btn-block">Factory Reset Data</button>
                </div>
            </div>
        </div>
        
        <!-- Toast Notification -->
        <div id="toast" class="toast">Message here</div>
    </div>

    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
</body>
</html>
